[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/( 
    \.git
  | \.venv
  | data
  | worktrees
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [".git", ".venv", "data", "worktrees"]

[tool.ruff.lint]
select = ["E", "F", "I", "B"]

[tool.mypy]
exclude = "(^|/)(\\.git|\\.venv|data|worktrees)(/|$)"
