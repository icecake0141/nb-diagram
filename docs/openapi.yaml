openapi: 3.1.0
info:
  title: nb-cartographer API
  version: 1.1.0
  description: API-first import, mapping, execute, graph, export, and reconcile workflow.
servers:
  - url: http://localhost:8000
paths:
  /api/imports:
    post:
      summary: Create import run from CSV
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [csv_file]
              properties:
                csv_file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Import created
        '400':
          description: Invalid upload request
  /api/imports/{import_id}:
    get:
      summary: Get import status and metadata
      parameters:
        - in: path
          name: import_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Import status
        '404':
          description: Import not found
  /api/imports/{import_id}/mapping:
    put:
      summary: Save deterministic mapping
      parameters:
        - in: path
          name: import_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mapping]
              properties:
                mapping:
                  type: object
                  additionalProperties:
                    type: [string, 'null']
      responses:
        '200':
          description: Mapping accepted
        '400':
          description: Invalid mapping
        '404':
          description: Import not found
  /api/imports/{import_id}/execute:
    post:
      summary: Execute import run
      parameters:
        - in: path
          name: import_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Import completed
        '404':
          description: Import not found
        '422':
          description: Import execution failed
  /api/graphs/{import_id}:
    get:
      summary: Fetch graph elements
      parameters:
        - in: path
          name: import_id
          required: true
          schema:
            type: integer
        - in: query
          name: view
          required: false
          schema:
            type: string
            enum: [device, interface]
            default: device
      responses:
        '200':
          description: Graph payload
        '404':
          description: Import not found
        '409':
          description: Import not completed
  /api/exports/{import_id}:
    get:
      summary: Download export artifact
      parameters:
        - in: path
          name: import_id
          required: true
          schema:
            type: integer
        - in: query
          name: format
          required: false
          schema:
            type: string
            enum: [json, drawio, csv]
            default: json
      responses:
        '200':
          description: Export artifact stream
        '400':
          description: Unsupported format
        '404':
          description: Import not found
        '409':
          description: Import not completed
  /api/results/{result_id}/drawio-layout:
    post:
      summary: Export drawio using provided node layout positions
      parameters:
        - in: path
          name: result_id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [positions]
              properties:
                positions:
                  type: object
                  additionalProperties:
                    type: object
                    required: [x, y]
                    properties:
                      x:
                        type: number
                      y:
                        type: number
      responses:
        '200':
          description: Drawio XML stream
        '400':
          description: Invalid positions payload
        '404':
          description: Result not found
  /api/reconcile-runs:
    post:
      summary: Create reconcile run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [import_id, method, params]
              properties:
                import_id:
                  type: integer
                method:
                  type: string
                  enum: [payload, snmp, ssh]
                seed_device:
                  type: string
                params:
                  type: object
                  additionalProperties: true
                  description: |
                    Method-specific options.
                    payload: { neighbors: [{ local_device, local_interface, remote_device, remote_interface }] }
                    snmp: { host, community|community_env, timeout?, retries?, port? }
                    ssh: { neighbors? } or { host, username, (command|vendor), timeout? }
                    ssh vendor: arista_eos | cisco_ios | cisco_nxos | juniper_junos
      responses:
        '201':
          description: Reconcile run created
        '400':
          description: Invalid request payload
        '404':
          description: Import not found
        '409':
          description: Import not completed
  /api/reconcile-runs/{run_id}:
    get:
      summary: Get reconcile run status and report
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reconcile run status
        '404':
          description: Reconcile run not found
  /api/reconcile-runs/{run_id}/execute:
    post:
      summary: Execute reconcile run
      parameters:
        - in: path
          name: run_id
          required: true
          schema:
            type: integer
        - in: query
          name: async
          required: false
          schema:
            type: boolean
            default: false
          description: Run in background and return immediately with running status.
      responses:
        '200':
          description: Reconcile completed
        '202':
          description: Reconcile accepted/running
        '404':
          description: Reconcile run not found
        '422':
          description: Reconcile failed (validation/runtime error)
        '501':
          description: Collector backend is unavailable
  /api/reconcile/compare:
    post:
      summary: Execute one-shot reconcile without persisting a reconcile run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [import_id, method, params]
              properties:
                import_id:
                  type: integer
                method:
                  type: string
                  enum: [payload, snmp, ssh]
                seed_device:
                  type: string
                params:
                  type: object
                  additionalProperties: true
                  description: |
                    Method-specific options.
                    payload: { neighbors: [{ local_device, local_interface, remote_device, remote_interface }] }
                    snmp: { host, community|community_env, timeout?, retries?, port? }
                    ssh: { neighbors? } or { host, username, (command|vendor), timeout? }
                    ssh vendor: arista_eos | cisco_ios | cisco_nxos | juniper_junos
      responses:
        '200':
          description: Reconcile report
        '400':
          description: Invalid request payload
        '404':
          description: Import or result not found
        '409':
          description: Import not completed
        '422':
          description: Reconcile failed (validation/runtime error)
        '501':
          description: Collector backend is unavailable
  /api/openapi.yaml:
    get:
      summary: Download OpenAPI specification
      responses:
        '200':
          description: OpenAPI YAML
        '404':
          description: Spec not found
